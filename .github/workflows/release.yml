name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Linux system deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - run: npm ci

      # Enable macOS code signing only when a certificate secret is present.
      # If it's absent, we fall back to an unsigned build so the release still
      # publishes (Gatekeeper warning) instead of failing the whole job.
      #
      # When signing, the APPLE_* secrets are exported to $GITHUB_ENV so they
      # are truly ABSENT (not empty) on the unsigned path. This matters: Tauri's
      # Rust bundler reads std::env::var("APPLE_CERTIFICATE"), which returns
      # Ok("") for a present-but-empty var and treats that as "signing
      # requested", then crashes in `security import` on empty cert data. An
      # inline `${{ … || '' }}` env value is present-but-empty, so it must not
      # be used here.
      - name: Determine macOS signing
        id: macsign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ] && [ -n "$APPLE_CERTIFICATE" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
            # Export to the job environment ONLY when signing, so these vars are
            # absent (not empty) otherwise. Values are masked as secrets. The
            # heredoc keeps a multi-line base64 certificate intact through
            # $GITHUB_ENV (a plain KEY=value would break on wrapped base64).
            {
              echo "APPLE_CERTIFICATE<<__ROVE_EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__ROVE_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "::notice::macOS code signing enabled"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            # A plain `[ … ] && echo` makes the step exit 1 on non-macOS (the
            # false test is the step's last command), which failed the Linux and
            # Windows jobs. Use an if-block so the step always exits 0.
            if [ "${{ matrix.platform }}" = "macos-latest" ]; then
              echo "::warning::APPLE_CERTIFICATE not set — producing an unsigned macOS build"
            fi
          fi

      # Fail fast with a clear message if the certificate secret is set but
      # malformed (bad base64, wrong password, or missing private key), rather
      # than dying deep inside tauri-action's `security import`.
      - name: Validate macOS certificate
        if: steps.macsign.outputs.sign == 'true'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if ! echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12 2>/dev/null; then
            echo "::error::APPLE_CERTIFICATE is not valid base64 — re-encode the .p12 as a single line (base64 -i cert.p12 -o cert.b64)"
            exit 1
          fi
          if ! openssl pkcs12 -info -in cert.p12 -noout -passin pass:"$APPLE_CERTIFICATE_PASSWORD" 2>/dev/null; then
            echo "::error::Could not open the .p12 — APPLE_CERTIFICATE_PASSWORD is wrong or the export is not a valid PKCS#12 file"
            rm -f cert.p12
            exit 1
          fi
          if ! openssl pkcs12 -in cert.p12 -nocerts -noout -passin pass:"$APPLE_CERTIFICATE_PASSWORD" 2>/dev/null; then
            echo "::error::The .p12 has no private key — re-export BOTH the certificate and its private key from Keychain Access"
            rm -f cert.p12
            exit 1
          fi
          rm -f cert.p12
          echo "::notice::APPLE_CERTIFICATE validated (valid .p12 with private key)"

      # macOS signing secrets are injected via $GITHUB_ENV by the step above,
      # but ONLY when signing is enabled — so on the unsigned path they are
      # absent (not empty) and Tauri does an ad-hoc signature instead of
      # crashing in `security import`.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Updater signing (required for auto-updates to install) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Rove ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your operating system from the assets below.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
