name: build

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck UI
        run: npx tsc --noEmit

      - name: Check service layer
        run: cargo check -p rove-core

      # Enable macOS code signing only when a certificate secret is present.
      # Otherwise fall back to an unsigned (ad-hoc) build so CI bundling still
      # succeeds. The APPLE_* secrets are exported to $GITHUB_ENV ONLY when
      # signing, so they are absent (not empty) on the unsigned path — Tauri's
      # Rust bundler treats a present-but-empty APPLE_CERTIFICATE as "signing
      # requested" and crashes in `security import`.
      - name: Determine macOS signing
        id: macsign
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$APPLE_CERTIFICATE" ]; then
            # Heredoc keeps a multi-line base64 certificate intact through
            # $GITHUB_ENV (a plain KEY=value would break on wrapped base64).
            {
              echo "APPLE_CERTIFICATE<<__ROVE_EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__ROVE_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_PASSWORD=$APPLE_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "::notice::macOS code signing enabled"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "::warning::APPLE_CERTIFICATE not set — producing an unsigned macOS build"
          fi

      # Build and bundle the full app so each OS produces installers that are
      # uploaded as per-run artifacts. An updater pubkey is configured, so
      # `tauri build` signs the updater artifacts and needs the private key.
      # Note: PRs from forks don't receive secrets, so this step will fail
      # there — acceptable for a private repo. Signed/notarized installers for
      # end users are produced by release.yml on `v*` tags.
      - name: Build app bundle
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: rove-${{ matrix.os }}
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/dmg/*.dmg
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: ignore
