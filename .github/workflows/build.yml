name: build

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck UI
        run: npx tsc --noEmit

      - name: Check service layer
        run: cargo check -p rove-core

      # CI is a "does it build" gate: compile the full app (frontend + Rust
      # binary) but skip bundling. --no-bundle avoids the flaky macOS DMG step
      # and the updater signing key, both of which belong to releases. Signed
      # installers are produced by release.yml on `v*` tags.
      - name: Build app
        run: npm run tauri:build -- --no-bundle
