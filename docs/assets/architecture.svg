<svg width="900" height="480" viewBox="0 0 900 480" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="card" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#b39dff"/>
    </linearGradient>
    <marker id="fwd" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#5b8cff"/>
    </marker>
    <marker id="back" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#b39dff"/>
    </marker>
    <marker id="mut" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#71747f"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect width="900" height="480" rx="20" fill="#0a0b0e"/>

  <!-- header -->
  <text x="40" y="52" font-size="12" font-weight="600" letter-spacing="1.5" fill="#71747f">ARCHITECTURE</text>
  <text x="40" y="76" font-size="17" font-weight="600" fill="#f5f6f8">Two programs, one thin typed bridge</text>

  <!-- ============ React UI card ============ -->
  <g filter="url(#card)">
    <rect x="40" y="112" width="316" height="214" rx="15" fill="#141519" stroke="#ffffff" stroke-opacity="0.07"/>
  </g>
  <path d="M55 112 H341 a15 15 0 0 1 15 15 v3 H40 v-3 a15 15 0 0 1 15 -15 Z" fill="url(#accentBar)"/>
  <text x="64" y="152" font-size="16" font-weight="600" fill="#f5f6f8">React UI</text>
  <text x="64" y="172" font-size="12" fill="#71747f">system webview · no Node runtime</text>
  <line x1="64" y1="188" x2="332" y2="188" stroke="#ffffff" stroke-opacity="0.06"/>
  <g font-size="12.5" fill="#a4a7b2">
    <text x="64" y="214">views · hooks · charts</text>
    <text x="64" y="240">window.networkAPI contract</text>
    <text x="64" y="266">Tauri bridge / browser mock</text>
  </g>
  <rect x="64" y="284" width="268" height="28" rx="8" fill="#5b8cff" fill-opacity="0.12"/>
  <text x="78" y="302" font-size="11.5" fill="#8fb0ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">src/ · Vite · TypeScript</text>

  <!-- ============ Rust backend card ============ -->
  <g filter="url(#card)">
    <rect x="544" y="112" width="316" height="214" rx="15" fill="#141519" stroke="#ffffff" stroke-opacity="0.07"/>
  </g>
  <path d="M559 112 H845 a15 15 0 0 1 15 15 v3 H544 v-3 a15 15 0 0 1 15 -15 Z" fill="url(#accentBar)"/>
  <text x="568" y="152" font-size="16" font-weight="600" fill="#f5f6f8">Rust backend</text>
  <text x="568" y="172" font-size="12" fill="#71747f">Tauri v2 · memory-safe</text>
  <line x1="568" y1="188" x2="836" y2="188" stroke="#ffffff" stroke-opacity="0.06"/>
  <g font-size="12.5" fill="#a4a7b2">
    <text x="568" y="214">src-tauri · #[command] wrappers</text>
    <text x="568" y="240">rove-core · pure-Rust services</text>
    <text x="568" y="266">events · capabilities · window</text>
  </g>
  <rect x="568" y="284" width="268" height="28" rx="8" fill="#5b8cff" fill-opacity="0.12"/>
  <text x="582" y="302" font-size="11.5" fill="#8fb0ff" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">crates/rove-core</text>

  <!-- ============ bridge ============ -->
  <!-- request -->
  <text x="450" y="168" font-size="10.5" font-weight="500" letter-spacing="0.4" fill="#71747f" text-anchor="middle">REQUEST / RESPONSE</text>
  <line x1="360" y1="192" x2="540" y2="192" stroke="#5b8cff" stroke-width="1.6" marker-end="url(#fwd)"/>
  <rect x="404" y="181" width="92" height="22" rx="11" fill="#0a0b0e"/>
  <rect x="404" y="181" width="92" height="22" rx="11" fill="#5b8cff" fill-opacity="0.16"/>
  <text x="450" y="196" font-size="11" fill="#8fb0ff" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">invoke()</text>

  <!-- events -->
  <line x1="540" y1="236" x2="360" y2="236" stroke="#b39dff" stroke-width="1.6" marker-end="url(#back)"/>
  <rect x="412" y="225" width="76" height="22" rx="11" fill="#0a0b0e"/>
  <rect x="412" y="225" width="76" height="22" rx="11" fill="#b39dff" fill-opacity="0.16"/>
  <text x="450" y="240" font-size="11" fill="#c3b2ff" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">events</text>
  <text x="450" y="264" font-size="10.5" font-weight="500" letter-spacing="0.4" fill="#71747f" text-anchor="middle">PUSH · 3 EVENTS</text>

  <!-- ============ kernel / OS strip ============ -->
  <g filter="url(#card)">
    <rect x="40" y="366" width="820" height="82" rx="15" fill="#0e0f13" stroke="#ffffff" stroke-opacity="0.07"/>
  </g>
  <text x="64" y="400" font-size="13.5" font-weight="600" fill="#f5f6f8">Kernel &amp; OS tools</text>
  <text x="64" y="424" font-size="12" fill="#a4a7b2">/sys · /proc · ip · iw · nmcli · getent · ping · mDNS · HTTPS</text>
  <text x="836" y="400" font-size="11" fill="#71747f" text-anchor="end">live-throughput</text>
  <text x="836" y="418" font-size="11" fill="#71747f" text-anchor="end">speed-test-progress</text>
  <text x="836" y="436" font-size="11" fill="#71747f" text-anchor="end">network-changed</text>

  <!-- backend → OS -->
  <line x1="702" y1="326" x2="702" y2="362" stroke="#71747f" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#mut)"/>
</svg>
