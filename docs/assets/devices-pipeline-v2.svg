<svg xmlns="http://www.w3.org/2000/svg" width="920" height="356" viewBox="0 0 920 356" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  
  <rect x="0.5" y="0.5" width="919" height="355" rx="20" fill="#15151b" stroke="rgba(255,255,255,0.06)"></rect>

  
  <text x="48" y="58" font-size="12" font-weight="600" letter-spacing="2.2" fill="#6b6b78">DEVICE DISCOVERY</text>
  <text x="48" y="88" font-size="22" font-weight="700" fill="#f2f2f5">A four-step pipeline</text>

  
  <rect x="48.5" y="112.5" width="190" height="151" rx="14" fill="#1c1c24" stroke="rgba(129,140,248,0.28)"></rect>
  <circle cx="79" cy="143" r="13" fill="rgba(129,140,248,0.15)" stroke="rgba(129,140,248,0.5)"></circle>
  <text x="79" y="147.5" font-size="12.5" font-weight="700" fill="#a5b4fc" text-anchor="middle">1</text>
  <text x="102" y="148" font-size="15.5" font-weight="700" fill="#f2f2f5">Sweep</text>
  <text x="66" y="176" font-size="13" fill="#9a9aa8">
    <tspan x="66" dy="0">Ping the /24 — 64</tspan>
    <tspan x="66" dy="19">concurrent probes to</tspan>
    <tspan x="66" dy="19">force ARP into the</tspan>
    <tspan x="66" dy="19">neighbor table.</tspan>
  </text>

  <polygon points="245,183 253,188 245,193" fill="#55556a"></polygon>

  
  <rect x="259.5" y="112.5" width="190" height="151" rx="14" fill="#1c1c24" stroke="rgba(167,139,250,0.28)"></rect>
  <circle cx="290" cy="143" r="13" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.5)"></circle>
  <text x="290" y="147.5" font-size="12.5" font-weight="700" fill="#c4b5fd" text-anchor="middle">2</text>
  <text x="313" y="148" font-size="15.5" font-weight="700" fill="#f2f2f5">mDNS</text>
  <text x="277" y="176" font-size="13" fill="#9a9aa8">
    <tspan x="277" dy="0">Listen ~3 s for service</tspan>
    <tspan x="277" dy="19">announces — devices</tspan>
    <tspan x="277" dy="19">name themselves.</tspan>
  </text>

  <polygon points="456,183 464,188 456,193" fill="#55556a"></polygon>

  
  <rect x="470.5" y="112.5" width="190" height="151" rx="14" fill="#1c1c24" stroke="rgba(96,165,250,0.28)"></rect>
  <circle cx="501" cy="143" r="13" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.5)"></circle>
  <text x="501" y="147.5" font-size="12.5" font-weight="700" fill="#93c5fd" text-anchor="middle">3</text>
  <text x="524" y="148" font-size="15.5" font-weight="700" fill="#f2f2f5">Neighbors</text>
  <text x="488" y="176" font-size="13" fill="#9a9aa8">
    <tspan x="488" dy="0">Read <tspan font-family="Menlo, Consolas, monospace" font-size="12" fill="#93c5fd">ip neigh</tspan> /</tspan>
    <tspan x="488" dy="19"><tspan font-family="Menlo, Consolas, monospace" font-size="12" fill="#93c5fd">arp -a</tspan> as ground</tspan>
    <tspan x="488" dy="19">truth of who exists.</tspan>
  </text>

  <polygon points="667,183 675,188 667,193" fill="#55556a"></polygon>

  
  <rect x="681.5" y="112.5" width="190" height="151" rx="14" fill="#1c1c24" stroke="rgba(52,211,153,0.28)"></rect>
  <circle cx="712" cy="143" r="13" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.5)"></circle>
  <text x="712" y="147.5" font-size="12.5" font-weight="700" fill="#6ee7b7" text-anchor="middle">4</text>
  <text x="735" y="148" font-size="15.5" font-weight="700" fill="#f2f2f5">Enrich</text>
  <text x="699" y="176" font-size="13" fill="#9a9aa8">
    <tspan x="699" dy="0">Vendor (OUI), hostname,</tspan>
    <tspan x="699" dy="19">and a trust-ranked</tspan>
    <tspan x="699" dy="19">device kind.</tspan>
  </text>

  
  <path d="M 48.5 273 L 48.5 279 Q 48.5 281 50.5 281 L 447.5 281 Q 449.5 281 449.5 279 L 449.5 273" fill="none" stroke="#55556a"></path>
  <text x="249" y="299" font-size="11" font-weight="600" letter-spacing="1.1" fill="#7c7c8a" text-anchor="middle">RUN CONCURRENTLY</text>

  
  <line x1="48" y1="316" x2="872" y2="316" stroke="rgba(255,255,255,0.06)"></line>
  <text x="48" y="338" font-size="12.5" fill="#7c7c8a">The router&#39;s admin page stays authoritative for devices that hide.</text>
</svg>