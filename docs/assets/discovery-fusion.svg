<svg xmlns="http://www.w3.org/2000/svg" width="920" height="628" viewBox="0 0 920 628" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <rect x="0.5" y="0.5" width="919" height="627" rx="20" fill="#15151b" stroke="rgba(255,255,255,0.06)"></rect>

  <text x="48" y="52" font-size="12" font-weight="600" letter-spacing="2.2" fill="#6b6b78">DEVICE DISCOVERY · THE WHOLE PIPELINE</text>
  <text x="48" y="82" font-size="22" font-weight="700" fill="#f2f2f5">Seven unprivileged signals, one trust-weighted vote</text>

  <!-- subnet pill -->
  <rect x="355.5" y="96.5" width="209" height="29" rx="14.5" fill="#14141c" stroke="rgba(255,255,255,0.1)"></rect>
  <text x="460" y="115" font-family="Menlo, Consolas, monospace" font-size="12.5" fill="#c9c9d4" text-anchor="middle">subnet 192.168.1.0/24</text>

  <!-- distribution bus -->
  <line x1="460" y1="125" x2="460" y2="138" stroke="#55556a" stroke-width="1.5"></line>
  <line x1="140.5" y1="138" x2="775.5" y2="138" stroke="#55556a" stroke-width="1.5"></line>
  <g stroke="#55556a" stroke-width="1.5">
    <line x1="140.5" y1="138" x2="140.5" y2="160"></line>
    <line x1="333.5" y1="138" x2="333.5" y2="160"></line>
    <line x1="582.5" y1="138" x2="582.5" y2="160"></line>
    <line x1="775.5" y1="138" x2="775.5" y2="160"></line>
  </g>
  <g fill="#55556a">
    <polygon points="135.5,153 145.5,153 140.5,161"></polygon>
    <polygon points="328.5,153 338.5,153 333.5,161"></polygon>
    <polygon points="577.5,153 587.5,153 582.5,161"></polygon>
    <polygon points="770.5,153 780.5,153 775.5,161"></polygon>
  </g>
  <text x="130" y="151" font-size="10" font-weight="600" letter-spacing="1" fill="#6b6b78">ALL CONCURRENT · ~3.2 s</text>

  <!-- source cards -->
  <!-- ICMP -->
  <rect x="48.5" y="160.5" width="185" height="104" rx="13" fill="#1c1c24" stroke="rgba(129,140,248,0.28)"></rect>
  <text x="66" y="188" font-size="14.5" font-weight="700" fill="#f2f2f5">ICMP sweep</text>
  <text x="66" y="207" font-size="10" font-weight="600" letter-spacing="0.8" fill="#a5b4fc">PROVOKE ARP</text>
  <text x="66" y="230" font-size="12.5" fill="#9a9aa8">ping bait — 64</text>
  <text x="66" y="248" font-size="12.5" fill="#9a9aa8">concurrent probes</text>
  <!-- TCP -->
  <rect x="241.5" y="160.5" width="185" height="104" rx="13" fill="#1c1c24" stroke="rgba(167,139,250,0.28)"></rect>
  <text x="259" y="188" font-size="14.5" font-weight="700" fill="#f2f2f5">TCP connect</text>
  <text x="259" y="207" font-size="10" font-weight="600" letter-spacing="0.8" fill="#c4b5fd">PROVOKE ARP</text>
  <text x="259" y="230" font-size="12.5" fill="#9a9aa8">SYN/RST bait —</text>
  <text x="259" y="248" font-size="12.5" fill="#9a9aa8">records open ports</text>
  <!-- mDNS -->
  <rect x="490.5" y="160.5" width="185" height="104" rx="13" fill="#1c1c24" stroke="rgba(96,165,250,0.28)"></rect>
  <text x="508" y="188" font-size="14.5" font-weight="700" fill="#f2f2f5">mDNS listen</text>
  <text x="508" y="207" font-size="10" font-weight="600" letter-spacing="0.8" fill="#93c5fd">PASSIVE</text>
  <text x="508" y="230" font-size="12.5" fill="#9a9aa8">name + hardware</text>
  <text x="508" y="248" font-size="12.5" fill="#9a9aa8">model</text>
  <!-- SSDP -->
  <rect x="683.5" y="160.5" width="185" height="104" rx="13" fill="#1c1c24" stroke="rgba(52,211,153,0.28)"></rect>
  <text x="701" y="188" font-size="14.5" font-weight="700" fill="#f2f2f5">SSDP M-SEARCH</text>
  <text x="701" y="207" font-size="10" font-weight="600" letter-spacing="0.8" fill="#6ee7b7">PASSIVE</text>
  <text x="701" y="230" font-size="12.5" fill="#9a9aa8">friendlyName ·</text>
  <text x="701" y="248" font-size="12.5" fill="#9a9aa8">model · type</text>

  <!-- merge active pair -> neighbor table -->
  <g stroke="#55556a" stroke-width="1.5" fill="none">
    <line x1="140.5" y1="264" x2="140.5" y2="276"></line>
    <line x1="333.5" y1="264" x2="333.5" y2="276"></line>
    <line x1="140.5" y1="276" x2="333.5" y2="276"></line>
    <line x1="237" y1="276" x2="237" y2="286"></line>
  </g>
  <polygon points="232,286 242,286 237,294" fill="#55556a"></polygon>
  <!-- merge passive pair -> identity -->
  <g stroke="#55556a" stroke-width="1.5" fill="none">
    <line x1="582.5" y1="264" x2="582.5" y2="276"></line>
    <line x1="775.5" y1="264" x2="775.5" y2="276"></line>
    <line x1="582.5" y1="276" x2="775.5" y2="276"></line>
    <line x1="679" y1="276" x2="679" y2="286"></line>
  </g>
  <polygon points="674,286 684,286 679,294" fill="#55556a"></polygon>

  <!-- neighbor table band -->
  <rect x="48.5" y="294.5" width="378" height="54" rx="13" fill="#191920" stroke="rgba(129,140,248,0.22)"></rect>
  <text x="237" y="317" font-size="14" font-weight="700" fill="#f2f2f5" text-anchor="middle">Kernel neighbor table</text>
  <text x="237" y="336" font-size="12" fill="#9a9aa8" text-anchor="middle">ground truth — who provably exists</text>
  <!-- identity band -->
  <rect x="490.5" y="294.5" width="378" height="54" rx="13" fill="#191920" stroke="rgba(52,211,153,0.22)"></rect>
  <text x="679" y="317" font-size="14" font-weight="700" fill="#f2f2f5" text-anchor="middle">Self-announced identity</text>
  <text x="679" y="336" font-size="12" fill="#9a9aa8" text-anchor="middle">friendly name · model · device type</text>

  <!-- neighbor -> enrich -->
  <line x1="237" y1="348" x2="237" y2="370" stroke="#55556a" stroke-width="1.5"></line>
  <polygon points="232,363 242,363 237,371" fill="#55556a"></polygon>
  <text x="252" y="363" font-size="10.5" fill="#6b6b78">per host, one round</text>

  <!-- enrich band (existence spine) -->
  <rect x="48.5" y="372.5" width="560" height="62" rx="13" fill="#1c1c24" stroke="rgba(255,255,255,0.07)"></rect>
  <text x="72" y="398" font-size="14" font-weight="700" fill="#f2f2f5">Enrich each host</text>
  <text x="72" y="420" font-size="12.5" fill="#9a9aa8">OUI vendor · hostname (rDNS ‖ HTTP banner ‖ NetBIOS) · model</text>

  <!-- identity dashed rail down to classify -->
  <path d="M679 348 L679 470" fill="none" stroke="#55556a" stroke-width="1.5" stroke-dasharray="5 4"></path>
  <polygon points="674,464 684,464 679,472" fill="#55556a"></polygon>
  <text x="691" y="410" font-size="10.5" fill="#6b6b78">identity signals</text>

  <!-- enrich -> classify -->
  <line x1="237" y1="434" x2="237" y2="470" stroke="#55556a" stroke-width="1.5"></line>
  <polygon points="232,464 242,464 237,472" fill="#55556a"></polygon>

  <!-- classify band -->
  <rect x="48.5" y="472.5" width="820" height="70" rx="13" fill="#1c1c2b" stroke="rgba(196,181,253,0.3)"></rect>
  <text x="72" y="500" font-size="15" font-weight="700" fill="#f2f2f5"><tspan font-family="Menlo, Consolas, monospace" fill="#c4b5fd">classify()</tspan> — weighted vote over 13 signals</text>
  <text x="72" y="524" font-size="12.5" fill="#9a9aa8">mDNS · SSDP · open ports · HTTP banner · hostname · vendor  →  highest total wins the device <tspan fill="#c4b5fd">kind</tspan></text>

  <!-- classify -> output -->
  <line x1="460" y1="542" x2="460" y2="564" stroke="#55556a" stroke-width="1.5"></line>
  <polygon points="455,557 465,557 460,565" fill="#55556a"></polygon>

  <!-- output band -->
  <rect x="48.5" y="566.5" width="820" height="46" rx="13" fill="#191920" stroke="rgba(255,255,255,0.08)"></rect>
  <text x="460" y="594" font-size="12.5" fill="#c9c9d4" text-anchor="middle">+ self  ·  sort(gateway, self, IP)  ·  dedupe(MAC)  →  <tspan font-family="Menlo, Consolas, monospace" fill="#a5b4fc">LanDeviceScan</tspan>  →  IPC  →  UI</text>
</svg>
